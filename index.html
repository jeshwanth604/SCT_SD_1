<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature Converter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="tc">
        <h2 >Temperature Converter</h2>
        <label for="temp">Temperature</label>
        <input type="number" id="temperature" name="temp" placeholder="Enter value">
        <br><br>
        <label for="fromScale">From:</label>
        <select id="fromScale" required>
            <option value="c">celsius</option>
            <option value="f">fahrenheit</option>
            <option value="k">kelvin</option>
        </select>
        <br><br>
        <label for="toScale">To:</label>
        <select id="toScale" required >
            <option value="c">celsius</option>
            <option value="f">fahrenheit</option>
            <option value="k">kelvin</option>
        </select>

        <br><br>

        <button onclick="tempConvert()">Convert</button>

        <br>
        
       <h3>Result: <span id="result" style="color: green;"></span></h3>
        
    </div>
    <script src="script.js"></script>
</body>
</html>
